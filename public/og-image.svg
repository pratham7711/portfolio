<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00E5D1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E5D1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Wireframe lines suggesting the 3D icosahedron from the hero -->
  <g stroke="#00E5D1" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <polygon points="980,150 1080,220 1080,340 980,410 880,340 880,220"/>
    <polygon points="980,210 1040,250 1040,320 980,360 920,320 920,250"/>
    <line x1="980" y1="150" x2="980" y2="410"/>
    <line x1="880" y1="220" x2="1080" y2="340"/>
    <line x1="880" y1="340" x2="1080" y2="220"/>
  </g>

  <!-- Top label -->
  <text x="80" y="120" fill="#00E5D1" font-family="'Space Grotesk', sans-serif"
        font-size="22" font-weight="500" letter-spacing="8">PORTFOLIO · 2026</text>

  <!-- Main name -->
  <text x="80" y="320" fill="#ffffff" font-family="'Space Grotesk', sans-serif"
        font-size="120" font-weight="700" letter-spacing="-4">PRATHAM</text>
  <text x="80" y="440" fill="#ffffff" font-family="'Space Grotesk', sans-serif"
        font-size="120" font-weight="700" letter-spacing="-4">SHARMA</text>

  <!-- Subtitle -->
  <text x="80" y="510" fill="#00E5D1" font-family="'Space Grotesk', sans-serif"
        font-size="32" font-weight="500" letter-spacing="2">Full-Stack &amp; AI Engineer</text>

  <!-- Bottom strip -->
  <text x="80" y="580" fill="rgba(255,255,255,0.5)" font-family="'Space Grotesk', sans-serif"
        font-size="22" font-weight="400" letter-spacing="4">PRATHAMSHARMA.IN · REACT · GSAP · AI</text>
</svg>
